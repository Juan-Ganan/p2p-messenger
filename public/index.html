<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger PRO | Secure Chat</title>
    <style>
        /* Estilos Globales Modernos */
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.2rem; margin: 0; color: var(--accent); }

        /* Login Area */
        .login-bar {
            display: flex;
            gap: 10px;
        }

        input {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: var(--accent-hover); }

        /* Layout Principal */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar de Usuarios */
        .users {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid #334155;
            padding: 20px;
            overflow-y: auto;
        }

        .users h3 { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        #users { list-style: none; padding: 0; }

        #users li {
            background: #334155;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .user-controls button {
            padding: 4px 8px;
            margin-left: 4px;
            font-size: 12px;
            background: #475569;
        }

        /* Área de Chat y Video */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        /* Sección Video */
        .video-grid {
            display: flex;
            gap: 15px;
            padding: 20px;
            justify-content: center;
            background: #020617;
        }

        video {
            width: 280px;
            border-radius: 12px;
            background: #1e293b;
            border: 2px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .media-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #020617;
        }

        .btn-media { border-radius: 50%; width: 45px; height: 45px; padding: 0; }
        .btn-mic { background: var(--accent); }
        .btn-cam { background: var(--success); }

        /* Mensajes */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #chat p {
            margin: 0;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 70%;
            width: fit-content;
            background: #334155;
            font-size: 0.95rem;
        }

        /* Input de mensaje */
        .chat-input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: var(--bg-panel);
        }

        .chat-input-area input { flex: 1; padding: 12px; }

    </style>
</head>

<body>

<header>
    <h1>🚀 Messenger <span style="color:var(--text-dim); font-weight: normal; font-size: 0.8rem;">SECURE P2P</span></h1>
    <div class="login-bar">
        <input id="username" placeholder="Tu apodo...">
        <button onclick="join()">Entrar</button>
    </div>
</header>

<div class="container">

    <div class="users">
        <h3>En línea</h3>
        <ul id="users"></ul>
    </div>

    <div class="chat">
        <div class="video-grid">
            <video id="localVideo" autoplay muted title="Tú"></video>
            <video id="remoteVideo" autoplay title="Remoto"></video>
        </div>

        <div class="media-controls">
            <button class="btn-media btn-mic" onclick="toggleMic()">🎤</button>
            <button class="btn-media btn-cam" onclick="toggleCam()">📷</button>
        </div>

        <div id="chat">
            <p style="color:var(--text-dim); background: transparent; font-style: italic;">Bienvenido al chat seguro. Selecciona un usuario para comenzar.</p>
        </div>

        <div class="chat-input-area">
            <input id="msg" placeholder="Escribe un mensaje cifrado...">
            <button onclick="send()">Enviar</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    /* MANTENEMOS TODA TU LÓGICA ORIGINAL INTACTA
       He actualizado ligeramente el renderizado de la lista de usuarios para que encaje con el nuevo CSS.
    */
    const socket = io();
    let username;
    let currentTarget;
    let localStream, pc;
    let micOn=true, camOn=true;
    let keyPair;
    let sharedKeys = {};

    const config = {
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            {
                urls: "turn:openrelay.metered.ca:80",
                username: "openrelayproject",
                credential: "openrelayproject"
            },
            {
                urls: "turn:openrelay.metered.ca:443",
                username: "openrelayproject",
                credential: "openrelayproject"
            }
        ]
    };

    function join(){
        username = document.getElementById("username").value;
        socket.emit("join", username);
    }

    socket.on("user-list", (users)=>{
        const ul = document.getElementById("users");
        ul.innerHTML="";
        for(let id in users){
            if(id===socket.id) continue;

            const li=document.createElement("li");
            li.innerHTML = `<span>${users[id]}</span>
                <div class="user-controls">
                    <button onclick="callUser('${id}')" title="Llamar">📞</button>
                    <button onclick="selectChat('${id}')" title="Chat">💬</button>
                </div>`;
            ul.appendChild(li);
        }
    });

    async function selectChat(id){
        currentTarget = id;
        if (!sharedKeys[id]) { await generarClaves(id); }
        // Estilo visual para saber con quién hablamos
        console.log("Conectando con: " + id);
    }

    async function initMedia(){
        localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        document.getElementById("localVideo").srcObject = localStream;
    }

    async function callUser(id){
        currentTarget = id;
        await initMedia();
        await generarClaves(id);
        pc = createPeer();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("offer",{to:id,offer});
    }

    function createPeer(){
        const peer = new RTCPeerConnection(config);
        localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));
        peer.ontrack = e=>{ document.getElementById("remoteVideo").srcObject = e.streams[0]; };
        peer.onicecandidate = e=>{
            if(e.candidate){ socket.emit("ice-candidate",{to:currentTarget,candidate:e.candidate}); }
        };
        return peer;
    }

    socket.on("offer", async ({from,offer})=>{
        currentTarget = from;
        await initMedia();
        await generarClaves(from);
        pc = createPeer();
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("answer",{to:from,answer});
    });

    socket.on("answer", async ({answer})=>{ await pc.setRemoteDescription(answer); });
    socket.on("ice-candidate", async ({candidate})=>{ if(pc) await pc.addIceCandidate(candidate); });

    function toggleMic(){
        micOn=!micOn;
        localStream.getAudioTracks()[0].enabled=micOn;
    }

    function toggleCam(){
        camOn=!camOn;
        localStream.getVideoTracks()[0].enabled=camOn;
    }

    async function generarClaves(target){
        keyPair = await crypto.subtle.generateKey({name:"ECDH",namedCurve:"P-256"},true,["deriveKey"]);
        const pub = await crypto.subtle.exportKey("jwk", keyPair.publicKey);
        socket.emit("public-key",{to:target,key:pub});
    }

    socket.on("public-key", async ({from,key})=>{
        if (!keyPair) {
            keyPair = await crypto.subtle.generateKey({name:"ECDH",namedCurve:"P-256"},true,["deriveKey"]);
        }
        const imported = await crypto.subtle.importKey("jwk",key,{name:"ECDH",namedCurve:"P-256"},true,[]);
        const shared = await crypto.subtle.deriveKey({name:"ECDH",public:imported},keyPair.privateKey,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
        sharedKeys[from] = shared;
        const pub = await crypto.subtle.exportKey("jwk", keyPair.publicKey);
        socket.emit("public-key",{to:from,key:pub});
    });

    async function send(){
        if(!currentTarget) return alert("Selecciona un usuario primero");
        const key = sharedKeys[currentTarget];
        if(!key) return alert("Estableciendo conexión segura... intenta en un segundo");
        const msgInput = document.getElementById("msg");
        const msg = msgInput.value;
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = new TextEncoder();
        const encrypted = await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc.encode(msg));

        socket.emit("mensaje",{
            to:currentTarget,
            user:username,
            data:Array.from(new Uint8Array(encrypted)),
            iv:Array.from(iv)
        });

        const chatBox = document.getElementById("chat");
        chatBox.innerHTML += `<p style="align-self: flex-end; background: var(--accent);"><strong>Tú:</strong> ${msg}</p>`;
        msgInput.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    socket.on("mensaje", async (p)=>{
        const key = sharedKeys[p.from];
        if(!key) return;
        const dec = new TextDecoder();
        const decrypted = await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(p.iv)},key,new Uint8Array(p.data));
        
        const chatBox = document.getElementById("chat");
        chatBox.innerHTML += `<p><strong>${p.user}:</strong> ${dec.decode(decrypted)}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>

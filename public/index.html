<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Messenger PRO | Secure Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menú">
      <svg id="hamIcon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      Messenger
      <span class="logo-badge">PRO</span>
    </div>

    <div class="topbar-spacer"></div>

    <div class="general-btn">
      <button onclick="toggleGeneral()" id="btnGeneral" title="Sala General" class="btn-general">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        General
      </button>
    </div>

    <div class="topbar-spacer"></div>

    <div class="join-row">
      <input class="join-input" id="username" placeholder="Tu apodo..." maxlength="20">
      <button class="btn-join" id="btnJoin" onclick="join()">Entrar</button>
    </div>
  </header>

  <!-- BODY -->
  <div class="body">
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">En línea — <span id="onlineCount">0</span></div>

      <div class="sidebar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Buscar..." id="searchInput" oninput="filterUsers()">
      </div>

      <ul class="user-list" id="userList"></ul>
    </aside>

    <!-- MAIN -->
    <main class="main" id="mainArea">

      <!-- CHAT HEADER -->
      <div class="chat-header" id="chatHeader" style="display:none;">
        <div class="avatar-sm" id="hAvatar"></div>
        <div>
          <div class="chat-title" id="hName">–</div>
          <div class="chat-sub" id="hSub">En línea</div>
        </div>
        <div class="e2e-badge">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>E2E cifrado</span>
        </div>
      </div>

      <!-- VIDEO AREA -->
      <div class="video-area" id="videoArea" style="display:none;">
        <div class="vid-wrap local">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="vid-label">Tú</div>
        </div>
        <div class="vid-wrap remote">
          <div class="vid-placeholder" id="remotePlaceholder">
            <svg viewBox="0 0 24 24"><path d="M23 7 16 12l7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            esperando...
          </div>
          <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
          <div class="vid-label" id="remoteLabel">–</div>
        </div>
        <div class="media-btns">
          <button class="btn-media" id="btnMic" onclick="toggleMic()" title="Micrófono">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
          </button>
          <button class="btn-media" id="btnCam" onclick="toggleCam()" title="Cámara">
            <svg viewBox="0 0 24 24"><path d="M23 7 16 12l7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          </button>
          <button class="btn-media danger" onclick="endCall()" title="Colgar">
            <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c1.12.45 2.3.75 3.53.85A2 2 0 0 1 23 17v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.43 19.43 0 0 1-3.56-3.56 19.8 19.8 0 0 1-3.07-8.63A2 2 0 0 1 7.38 5h3a2 2 0 0 1 2 1.72 13 13 0 0 0 .84 3.53 2 2 0 0 1-.45 2.11L11.5 13.5"/></svg>
          </button>
        </div>
      </div>

      <!-- MESSAGES / PLACEHOLDER -->
      <div class="chat-placeholder" id="chatPlaceholder">
        <div class="placeholder-ring">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span>Selecciona un usuario para chatear</span>
      </div>

      <div class="messages" id="messages" style="display:none;"></div>

      <!-- INPUT -->
      <div class="input-area" id="inputArea" style="display:none;">
        <input class="msg-input" id="msgInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') sendMsg()">
        <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="sendImage()">
        <button class="btn-img" onclick="document.getElementById('imgInput').click()" title="Enviar imagen">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <button class="btn-send" onclick="sendMsg()" title="Enviar">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>
  </div>
</div>

<!-- ========== SOCKET.IO ========== -->
<script src="/socket.io/socket.io.js"></script>
<script>
/* =====================================================================
   MESSENGER PRO — Lógica completa
   ===================================================================== */

const socket = io();

let username;
let currentTarget = null;
let currentTargetName = null;
let inGeneralChat = false;
let localStream, pc;
let micOn = true, camOn = true;
let keyPair;
let sharedKeys = {};

/* ── ICE / STUN / TURN ─────────────────────────────────────────────── */
const RTC_CONFIG = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "turn:openrelay.metered.ca:80",  username: "openrelayproject", credential: "openrelayproject" },
    { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
  ]
};

/* ── AVATAR COLORS ─────────────────────────────────────────────────── */
const COLORS = [
  { bg:"rgba(79,123,255,0.18)", color:"#7aa2ff" },
  { bg:"rgba(52,211,153,0.18)", color:"#34d399" },
  { bg:"rgba(251,191,36,0.18)", color:"#fbbf24" },
  { bg:"rgba(248,113,113,0.18)",color:"#f87171" },
  { bg:"rgba(196,181,253,0.18)",color:"#c4b5fd" },
  { bg:"rgba(251,146,60,0.18)", color:"#fb923c" },
];

function colorFor(id) {
  let h = 0;
  for (let c of id) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function nowTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

/* ── JOIN ──────────────────────────────────────────────────────────── */
function join() {
  const v = document.getElementById('username').value.trim();
  if (!v) { document.getElementById('username').focus(); return; }
  username = v;
  socket.emit("join", username);
  const btn = document.getElementById('btnJoin');
  btn.textContent = '✓ ' + username;
  btn.classList.add('joined');
  btn.disabled = true;
}
/* ── GENERAL CHAT ──────────────────────────────────────────────── */
function toggleGeneral() {
  if (inGeneralChat) {
    inGeneralChat = false;
    socket.emit("leave-general");
    document.getElementById('btnGeneral').classList.remove('active');
    document.getElementById('chatPlaceholder').style.display = 'flex';
    document.getElementById('messages').style.display = 'none';
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('chatHeader').style.display = 'none';
    document.getElementById('videoArea').style.display = 'none';
  } else {
    inGeneralChat = true;
    currentTarget = "general";
    socket.emit("join-general");
    socket.emit("get-general-history");
    document.getElementById('btnGeneral').classList.add('active');

    const hAv = document.getElementById('hAvatar');
    hAv.textContent = '👥';
    hAv.style.background = 'transparent';
    hAv.style.color = 'var(--green)';
    document.getElementById('hName').textContent = 'Sala General';
    document.getElementById('remoteLabel').textContent = 'General';

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('videoArea').style.display = 'none';
    document.getElementById('chatPlaceholder').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
    
    closeSidebar();
  }
}
/* ── USER LIST ─────────────────────────────────────────────────────── */
let allUsers = {};

socket.on("user-list", (users) => {
  allUsers = users;
  renderUsers(users);
});

function renderUsers(users) {
  const ul = document.getElementById('userList');
  const q  = document.getElementById('searchInput').value.toLowerCase();
  ul.innerHTML = '';
  let count = 0;
  for (let id in users) {
    if (id === socket.id) continue;
    const name = users[id];
    if (q && !name.toLowerCase().includes(q)) continue;
    count++;
    const c = colorFor(id);
    const li = document.createElement('li');
    li.className = 'user-item' + (id === currentTarget ? ' active' : '');
    li.dataset.id = id;
    li.innerHTML = `
      <div class="avatar" style="background:${c.bg};color:${c.color};">
        ${initials(name)}<span class="dot"></span>
      </div>
      <div class="user-info">
        <div class="user-name">${name}</div>
        <div class="user-status">En línea</div>
      </div>
      <div class="user-actions">
        <div class="btn-icon" onclick="event.stopPropagation();callUser('${id}')" title="Llamar">
          <svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8 9.9a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7A2 2 0 0 1 22 16.9z"/></svg>
        </div>
      </div>`;
    li.addEventListener('click', () => selectChat(id, name));
    ul.appendChild(li);
  }
  document.getElementById('onlineCount').textContent = count;
}

function filterUsers() { renderUsers(allUsers); }

/* ── SELECT CHAT ───────────────────────────────────────────────────── */
async function selectChat(id, name) {
  if (inGeneralChat) {
    inGeneralChat = false;
    socket.emit("leave-general");
    document.getElementById('btnGeneral').classList.remove('active');
  }

  currentTarget = id;
  currentTargetName = name;

  document.querySelectorAll('.user-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const c = colorFor(id);

  // header
  const hAv = document.getElementById('hAvatar');
  hAv.textContent = initials(name);
  hAv.style.background = c.bg;
  hAv.style.color = c.color;
  document.getElementById('hName').textContent = name;
  document.getElementById('remoteLabel').textContent = name;

  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('videoArea').style.display  = 'flex';
  document.getElementById('chatPlaceholder').style.display = 'none';
  document.getElementById('messages').style.display   = 'flex';
  document.getElementById('inputArea').style.display  = 'flex';

  if (!sharedKeys[id]) await generarClaves(id);

  closeSidebar();
  document.getElementById('msgInput').focus();
}

/* ── MEDIA ─────────────────────────────────────────────────────────── */
async function initMedia() {
  if (localStream) return;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
  } catch(e) {
    console.warn("Sin cámara/micrófono:", e.message);
  }
}

function toggleMic() {
  micOn = !micOn;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  document.getElementById('btnMic').classList.toggle('off', !micOn);
}

function toggleCam() {
  camOn = !camOn;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  document.getElementById('btnCam').classList.toggle('off', !camOn);
}

function endCall() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('remoteVideo').style.display = 'none';
  document.getElementById('remotePlaceholder').style.display = 'flex';
  micOn = true; camOn = true;
  document.getElementById('btnMic').classList.remove('off');
  document.getElementById('btnCam').classList.remove('off');
}

/* ── WebRTC ────────────────────────────────────────────────────────── */
async function callUser(id) {
  if (!username) return alert("Primero entra con un apodo");
  await selectChat(id, allUsers[id] || id);
  await initMedia();
  await generarClaves(id);
  pc = createPeer(id);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("offer", { to: id, offer });
}

function createPeer(targetId) {
  const peer = new RTCPeerConnection(RTC_CONFIG);
  if (localStream) localStream.getTracks().forEach(t => peer.addTrack(t, localStream));
  peer.ontrack = e => {
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = e.streams[0];
    rv.style.display = 'block';
    document.getElementById('remotePlaceholder').style.display = 'none';
  };
  peer.onicecandidate = e => {
    if (e.candidate) socket.emit("ice-candidate", { to: targetId || currentTarget, candidate: e.candidate });
  };
  return peer;
}

socket.on("offer", async ({ from, offer }) => {
  currentTarget = from;
  await initMedia();
  await generarClaves(from);
  pc = createPeer(from);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit("answer", { to: from, answer });
  if (allUsers[from]) await selectChat(from, allUsers[from]);
});

socket.on("answer", async ({ answer }) => { if (pc) await pc.setRemoteDescription(answer); });
socket.on("ice-candidate", async ({ candidate }) => { if (pc) await pc.addIceCandidate(candidate); });

socket.on("user-joined-general", ({ id, name }) => {
  if (inGeneralChat) {
    console.log(name + " se unió a la sala general");
  }
});

socket.on("user-left-general", ({ id }) => {
  if (inGeneralChat) {
    console.log("Un usuario salió de la sala general");
  }
});

/* ── E2E CRIPTOGRAFÍA ──────────────────────────────────────────────── */
async function generarClaves(target) {
  keyPair = await crypto.subtle.generateKey(
    { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]
  );
  const pub = await crypto.subtle.exportKey("jwk", keyPair.publicKey);
  socket.emit("public-key", { to: target, key: pub });
}

socket.on("public-key", async ({ from, key }) => {
  if (!keyPair) {
    keyPair = await crypto.subtle.generateKey(
      { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]
    );
  }
  const imported = await crypto.subtle.importKey(
    "jwk", key, { name: "ECDH", namedCurve: "P-256" }, true, []
  );
  const shared = await crypto.subtle.deriveKey(
    { name: "ECDH", public: imported }, keyPair.privateKey,
    { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
  sharedKeys[from] = shared;
  const pub = await crypto.subtle.exportKey("jwk", keyPair.publicKey);
  socket.emit("public-key", { to: from, key: pub });
});

/* ── MENSAJES ──────────────────────────────────────────────────────── */
async function sendMsg() {
  if (!currentTarget) return;
  if (!username) return alert("Primero entra con un apodo");

  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if (!txt) return;

  if (inGeneralChat) {
    // Mensaje en sala general (sin encripción)
    socket.emit("mensaje-general", {
      user: username,
      data: txt
    });
  } else {
    // Mensaje privado (encriptado)
    const key = sharedKeys[currentTarget];
    if (!key) return alert("Estableciendo conexión segura, espera un momento...");

    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(txt));

    socket.emit("mensaje", {
      to: currentTarget,
      user: username,
      data: Array.from(new Uint8Array(encrypted)),
      iv: Array.from(iv)
    });
  }

  appendMsg(txt, true, nowTime());
  inp.value = '';
}

async function sendImage() {
  if (!currentTarget) return;
  if (!username) return alert("Primero entra con un apodo");

  const input = document.getElementById('imgInput');
  const file = input.files[0];
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) return alert("Imagen muy grande (máx 10MB)");

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;

    if (inGeneralChat) {
      // Imagen en sala general
      socket.emit("imagen-general", {
        user: username,
        image: base64
      });
    } else {
      // Imagen privada
      socket.emit("imagen", {
        to: currentTarget,
        user: username,
        image: base64
      });
    }

    appendImage(base64, true, nowTime());
    input.value = '';
  };
  reader.readAsDataURL(file);
}

socket.on("mensaje", async (p) => {
  const key = sharedKeys[p.from];
  if (!key) return;
  const dec = new TextDecoder();
  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: new Uint8Array(p.iv) }, key, new Uint8Array(p.data)
  );
  appendMsg(dec.decode(decrypted), false, nowTime(), p.from);
});

socket.on("imagen", (p) => {
  if (!inGeneralChat && currentTarget === p.from) {
    appendImage(p.image, false, nowTime(), p.from);
  }
});

socket.on("mensaje-general", (msg) => {
  if (inGeneralChat) {
    appendMsg(msg.data, msg.from === socket.id, nowTime(), msg.from);
  }
});

socket.on("imagen-general", (msg) => {
  if (inGeneralChat) {
    appendImage(msg.image, msg.from === socket.id, nowTime(), msg.from);
  }
});

socket.on("general-history", (messages) => {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  for (let msg of messages) {
    if (msg.type === 'text') {
      appendMsg(msg.data, msg.from === socket.id, new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), msg.from);
    } else if (msg.type === 'image') {
      appendImage(msg.image, msg.from === socket.id, new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), msg.from);
    }
  }
});

function appendMsg(text, isMe, time, fromId) {
  const msgs = document.getElementById('messages');
  let c = null;
  let name = '';
  
  if (!isMe) {
    if (fromId && fromId !== socket.id) {
      c = colorFor(fromId);
      name = allUsers[fromId] || fromId;
    } else if (inGeneralChat) {
      return; // No mostrar si es de otro usuario pero no tenemos ID
    }
  }

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');
  row.innerHTML = isMe
    ? `<div class="bubble-wrap">
         <div class="bubble">${escHtml(text)}</div>
         <div class="msg-time">${time}</div>
       </div>`
    : `<div class="msg-av" style="background:${c.bg};color:${c.color};">${initials(name)}</div>
       <div class="bubble-wrap">
         <div class="bubble">${escHtml(text)}</div>
         <div class="msg-time">${time}</div>
       </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendImage(imageData, isMe, time, fromId) {
  const msgs = document.getElementById('messages');
  let c = null;
  let name = '';
  
  if (!isMe && fromId && fromId !== socket.id) {
    c = colorFor(fromId);
    name = allUsers[fromId] || fromId;
  }

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');
  row.innerHTML = isMe
    ? `<div class="bubble-wrap">
         <div class="bubble bubble-image"><img src="${imageData}" alt="imagen"></div>
         <div class="msg-time">${time}</div>
       </div>`
    : `<div class="msg-av" style="background:${c.bg};color:${c.color};">${initials(name)}</div>
       <div class="bubble-wrap">
         <div class="bubble bubble-image"><img src="${imageData}" alt="imagen"></div>
         <div class="msg-time">${time}</div>
       </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── SIDEBAR MÓVIL ──────────────────────────────────────────────────── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const isOpen = sb.classList.contains('open');
  sb.classList.toggle('open', !isOpen);
  ov.classList.toggle('open', !isOpen);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
</script>
</body>
</html>
